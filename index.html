<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="theme-color" content="#0a1208"/>
<title>Mon Plan Nutrition</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{background:#0a1208;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:'Georgia',serif;background:linear-gradient(135deg,#0f1923 0%,#1a2d1a 60%,#0f1923 100%);color:#e8e0d0;display:flex;flex-direction:column;}

  /* LAYOUT */
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
  .hdr{background:linear-gradient(180deg,#0a1208 0%,transparent 100%);padding:env(safe-area-inset-top,20px) 20px 0;padding-top:calc(env(safe-area-inset-top,0px) + 20px);text-align:center;flex-shrink:0;}
  .hdr-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:#c8e06a;}
  .hdr-sub{font-family:'DM Sans',sans-serif;font-size:10px;color:rgba(200,224,106,0.4);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
  .tabs{display:flex;margin:12px 16px 0;border-radius:12px;overflow:hidden;border:1px solid rgba(200,224,106,0.15);flex-shrink:0;}
  .tab-btn{flex:1;padding:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;background:transparent;border:none;color:rgba(200,224,106,0.45);cursor:pointer;transition:all 0.2s;}
  .tab-btn.active{background:rgba(200,224,106,0.12);color:#c8e06a;}

  .scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  ::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-thumb{background:rgba(200,224,106,0.15);border-radius:3px;}

  /* DAYS NAV */
  .days-nav{display:flex;overflow-x:auto;gap:6px;padding:12px 14px;scrollbar-width:none;flex-shrink:0;}
  .days-nav::-webkit-scrollbar{display:none;}
  .day-btn{flex-shrink:0;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:7px 13px;cursor:pointer;transition:all 0.2s;text-align:center;}
  .day-btn.active{background:#c8e06a;border-color:#c8e06a;}
  .dn{font-family:'DM Sans',sans-serif;font-size:10px;color:rgba(232,224,208,0.45);text-transform:uppercase;letter-spacing:1px;}
  .day-btn.active .dn{color:#0f1923;}
  .dd{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#e8e0d0;}
  .day-btn.active .dd{color:#0f1923;}

  /* DAY CONTENT */
  .day-content{padding:14px 14px 80px;max-width:520px;margin:0 auto;width:100%;}
  .day-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .day-name-txt{font-family:'Playfair Display',serif;font-size:19px;color:#c8e06a;}
  .day-date-txt{font-family:'DM Sans',sans-serif;font-size:11px;color:rgba(232,224,208,0.3);margin-top:2px;}
  .day-totals{text-align:right;font-family:'DM Sans',sans-serif;font-size:11px;color:rgba(200,224,106,0.5);}
  .day-totals strong{display:block;font-size:15px;color:#c8e06a;font-weight:600;}

  /* MEAL CARDS */
  .meal-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:13px;margin-bottom:9px;overflow:hidden;}
  .meal-row{display:flex;align-items:center;padding:11px 12px;gap:9px;}
  .meal-emoji{width:32px;height:32px;background:rgba(200,224,106,0.1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .meal-meta{flex:1;min-width:0;}
  .meal-lbl{font-family:'DM Sans',sans-serif;font-size:10px;color:rgba(200,224,106,0.4);text-transform:uppercase;letter-spacing:1.2px;}
  .meal-name{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:#e8e0d0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .meal-right{display:flex;align-items:center;gap:7px;flex-shrink:0;}
  .meal-kcal{font-family:'DM Sans',sans-serif;font-size:12px;color:#c8e06a;font-weight:600;}
  .swap-btn{background:rgba(200,224,106,0.08);border:1px solid rgba(200,224,106,0.2);border-radius:7px;padding:5px 9px;font-family:'DM Sans',sans-serif;font-size:11px;color:#c8e06a;cursor:pointer;}
  .meal-items-list{padding:0 12px 10px 53px;border-top:1px solid rgba(255,255,255,0.05);}
  .meal-item{font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(232,224,208,0.6);padding:3px 0;display:flex;gap:5px;}
  .meal-item::before{content:"–";color:#c8e06a;flex-shrink:0;}
  .prot-badge{font-family:'DM Sans',sans-serif;font-size:10px;background:rgba(200,224,106,0.08);border:1px solid rgba(200,224,106,0.15);border-radius:20px;padding:2px 8px;color:rgba(200,224,106,0.6);margin-top:6px;display:inline-block;}

  /* SWAP PANEL */
  .swap-panel{background:rgba(8,15,6,0.97);border:1px solid rgba(200,224,106,0.2);border-radius:13px;margin-bottom:9px;padding:12px;}
  .swap-title{font-family:'Playfair Display',serif;font-size:13px;color:#c8e06a;margin-bottom:9px;}
  .alt-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:9px;padding:9px 11px;margin-bottom:7px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:border-color 0.15s;}
  .alt-card:active{border-color:#c8e06a;background:rgba(200,224,106,0.06);}
  .alt-name{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:#e8e0d0;}
  .alt-sub{font-family:'DM Sans',sans-serif;font-size:11px;color:rgba(232,224,208,0.35);margin-top:2px;}
  .alt-kcal{font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(200,224,106,0.7);font-weight:600;flex-shrink:0;margin-left:8px;}
  .close-btn{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px;font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(232,224,208,0.4);cursor:pointer;margin-top:2px;}

  /* SHOPPING */
  .shop-content{padding:12px 14px 80px;max-width:520px;margin:0 auto;width:100%;}
  .shop-tip{background:rgba(200,224,106,0.06);border:1px solid rgba(200,224,106,0.12);border-radius:11px;padding:11px 13px;margin-bottom:14px;font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(200,224,106,0.7);line-height:1.5;}
  .shop-stats{display:flex;gap:8px;margin-bottom:14px;}
  .shop-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:9px;text-align:center;font-family:'DM Sans',sans-serif;}
  .shop-stat-num{font-size:18px;font-weight:600;color:#c8e06a;}
  .shop-stat-lbl{font-size:10px;color:rgba(232,224,208,0.4);margin-top:2px;}
  .shop-cat{margin-bottom:16px;}
  .shop-cat-title{font-family:'Playfair Display',serif;font-size:14px;color:#c8e06a;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid rgba(200,224,106,0.1);}
  .shop-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;}
  .shop-check{width:19px;height:19px;border-radius:5px;border:1px solid rgba(200,224,106,0.3);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all 0.15s;}
  .shop-check.done{background:#c8e06a;border-color:#c8e06a;color:#0f1923;font-weight:700;}
  .shop-lbl{font-family:'DM Sans',sans-serif;font-size:13px;color:rgba(232,224,208,0.75);transition:all 0.15s;flex:1;}
  .shop-lbl.done{color:rgba(232,224,208,0.25);text-decoration:line-through;}
  .shop-qty{font-family:'DM Sans',sans-serif;font-size:11px;color:rgba(200,224,106,0.4);}
  .reset-btn{width:100%;background:rgba(255,100,100,0.06);border:1px solid rgba(255,100,100,0.15);border-radius:10px;padding:10px;font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(255,150,150,0.6);cursor:pointer;margin-top:8px;}

  /* TOAST */
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#c8e06a;color:#0f1923;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:10px 22px;border-radius:22px;box-shadow:0 4px 24px rgba(0,0,0,0.5);z-index:999;pointer-events:none;opacity:0;transition:opacity 0.3s;}
  .toast.show{opacity:1;}
</style>
</head>

    {key:"matin",label:"Matin",emoji:"🌅",type:"matin_sale",meal:ALT.matin_sale[0]},
    {key:"midi",label:"Midi",emoji:"☀️",type:"midi_commande",meal:{id:"libre",title:"Repas libre (intelligent)",items:["Viande ou poisson grillé","Légumes de saison","Évite fritures & sauces lourdes","1 verre de vin si souhaité"],kcal:600,prot:35,ing:[]}},
    {key:"snack",label:"Collation",emoji:"🍎",type:"snack",meal:ALT.snack[0]},
    {key:"soir",label:"Soir",emoji:"🌙",type:"soir",meal:ALT.soir[5]},
  ]},
  {day:"Dimanche",date:"11 mai",slots:[
    {key:"matin",label:"Matin",emoji:"🌅",type:"matin_sucre",meal:ALT.matin_sucre[2]},
    {key:"midi",label:"Midi",emoji:"☀️",type:"midi_maison",meal:ALT.midi_maison[0]},
    {key:"snack",label:"Collation",emoji:"🍎",type:"snack",meal:ALT.snack[1]},
    {key:"soir",label:"Soir",emoji:"🌙",type:"soir",meal:ALT.soir[5]},
  ]},
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  tab: "plan",
  activeDay: 0,
  days: JSON.parse(JSON.stringify(DAYS_INIT)),
  swapping: null, // {dayIdx, slotIdx}
  checked: JSON.parse(localStorage.getItem("shop_checked")||"{}"),
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function saveChecked(){ localStorage.setItem("shop_checked", JSON.stringify(state.checked)); }

function buildShoppingList() {
  // Collect all ingredients from current meals
  const map = {}; // key -> {n, q, c, count}
  state.days.forEach(d => d.slots.forEach(s => {
    (s.meal.ing||[]).forEach(ing => {
      const key = ing.c + ing.n;
      if(!map[key]) map[key] = {...ing, count:0};
      map[key].count++;
    });
  }));

  // Also add base staples
  const staples = [
    {c:"🫒",n:"Huile d'olive vierge extra",q:"1 bouteille"},
    {c:"🧂",n:"Sel & poivre",q:"selon stock"},
    {c:"🌿",n:"Herbes de Provence",q:"1 flacon"},
    {c:"🌶️",n:"Cumin + paprika",q:"1 flacon chacun"},
    {c:"🍋",n:"Citrons",q:"x4"},
    {c:"💧",n:"Eau plate (2L/jour)",q:"pack"},
  ];
  staples.forEach(s => {
    const key = s.c+s.n;
    if(!map[key]) map[key] = {...s, count:1};
  });

  // Group by emoji category
  const catOrder = ["🐟","🍗","🥩","🥚","🌾","🫘","🥦","🥬","🍅","🥕","🧅","🧄","🫑","🥑","🍎","🍌","🥛","🥜","🫙","🍞","🥔","🌿","🫒","🧂","🌶️","🍋","🍁","🍓","💧","🌾"];
  const groups = {};
  Object.values(map).forEach(item => {
    if(!groups[item.c]) groups[item.c]=[];
    groups[item.c].push(item);
  });
  return groups;
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2000);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  renderNav();
  if(state.tab==="plan") renderPlan();
  else renderShop();
}

function renderNav() {
  const nav = document.getElementById("days-nav");
  nav.innerHTML = state.days.map((d,i) => `
    <button class="day-btn${state.activeDay===i?" active":""}" onclick="setDay(${i})">
      <div class="dn">${d.day.substring(0,3)}</div>
      <div class="dd">${d.date.split(" ")[0]}</div>
    </button>
  `).join("");
}

function renderPlan() {
  document.getElementById("plan-view").style.display="flex";
  document.getElementById("courses-view").style.display="none";

  const d = state.days[state.activeDay];
  const total = d.slots.reduce((a,s)=>({kcal:a.kcal+(s.meal.kcal||0),prot:a.prot+(s.meal.prot||0)}),{kcal:0,prot:0});

  let html = `
    <div class="day-hdr">
      <div>
        <div class="day-name-txt">${d.day}</div>
        <div class="day-date-txt">${d.date}</div>
      </div>
      <div class="day-totals">
        <strong>${total.kcal} kcal</strong>
        <div>${total.prot}g protéines</div>
      </div>
    </div>
  `;

  d.slots.forEach((slot,si) => {
    const isSwapping = state.swapping && state.swapping.dayIdx===state.activeDay && state.swapping.slotIdx===si;
    const alts = (ALT[slot.type]||[]).filter(a=>a.id!==slot.meal.id);

    html += `<div class="meal-card">
      <div class="meal-row">
        <div class="meal-emoji">${slot.emoji}</div>
        <div class="meal-meta">
          <div class="meal-lbl">${slot.label}</div>
          <div class="meal-name">${slot.meal.title}</div>
        </div>
        <div class="meal-right">
          <div class="meal-kcal">${slot.meal.kcal} kcal</div>
          ${alts.length>0?`<button class="swap-btn" onclick="toggleSwap(${state.activeDay},${si})">${isSwapping?"✕":"↺"}</button>`:""}
        </div>
      </div>
      <div class="meal-items-list">
        ${slot.meal.items.map(item=>`<div class="meal-item">${item}</div>`).join("")}
        <div class="prot-badge">💪 ${slot.meal.prot}g protéines</div>
      </div>
    </div>`;

    if(isSwapping) {
      html += `<div class="swap-panel">
        <div class="swap-title">Choisir une alternative :</div>
        ${alts.map(alt=>`
          <div class="alt-card" onclick="swapMeal(${state.activeDay},${si},'${alt.id}','${slot.type}')">
            <div>
              <div class="alt-name">${alt.title}</div>
              <div class="alt-sub">${alt.items.slice(0,2).join(" · ")}${alt.items.length>2?" …":""}</div>
            </div>
            <div class="alt-kcal">${alt.kcal} kcal</div>
          </div>
        `).join("")}
        <button class="close-btn" onclick="toggleSwap(null,null)">Annuler</button>
      </div>`;
    }
  });

  document.getElementById("day-content").innerHTML = html;
}

function renderShop() {
  document.getElementById("plan-view").style.display="none";
  document.getElementById("courses-view").style.display="flex";

  const groups = buildShoppingList();
  const catLabels = {
    "🐟":"🐟 Poissons","🍗":"🍗 Volailles","🥩":"🥩 Viandes rouges","🥚":"🥚 Œufs",
    "🌾":"🌾 Féculents & Céréales","🫘":"🫘 Légumineuses","🥦":"🥦 Légumes","🥬":"🥬 Verdures",
    "🍅":"🍅 Tomates","🥕":"🥕 Carottes","🧅":"🧅 Oignons & Ail","🧄":"🧄 Ail","🫑":"🫑 Poivrons",
    "🥑":"🥑 Avocats","🍎":"🍎 Fruits","🍌":"🍌 Bananes","🥛":"🥛 Laits végétaux",
    "🥜":"🥜 Fruits secs & Oléagineux","🫙":"🫙 Conserves & Épicerie","🍞":"🍞 Pains",
    "🥔":"🥔 Patates","🌿":"🌿 Herbes","🫒":"🫒 Huiles & Condiments","🧂":"🧂 Assaisonnement",
    "🌶️":"🌶️ Épices","🍋":"🍋 Citrons","🍁":"🍁 Sirops","🍓":"🍓 Confitures","💧":"💧 Boissons",
  };

  const allItems = Object.values(groups).flat();
  const totalItems = allItems.length;
  const doneItems = allItems.filter(item => state.checked[item.c+item.n]).length;

  let html = `
    <div class="shop-tip">🔄 Liste mise à jour selon tes repas actuels. Si tu changes un repas dans le plan, reviens ici — la liste s'adapte !</div>
    <div class="shop-stats">
      <div class="shop-stat"><div class="shop-stat-num">${totalItems}</div><div class="shop-stat-lbl">articles</div></div>
      <div class="shop-stat"><div class="shop-stat-num">${doneItems}</div><div class="shop-stat-lbl">cochés</div></div>
      <div class="shop-stat"><div class="shop-stat-num">${totalItems-doneItems}</div><div class="shop-stat-lbl">restants</div></div>
    </div>
  `;

  Object.entries(groups).forEach(([cat, items]) => {
    const label = catLabels[cat] || cat;
    html += `<div class="shop-cat"><div class="shop-cat-title">${label}</div>`;
    items.forEach(item => {
      const key = item.c+item.n;
      const done = !!state.checked[key];
      html += `
        <div class="shop-item" onclick="toggleCheck('${key}')">
          <div class="shop-check${done?" done":""}">${done?"✓":""}</div>
          <div class="shop-lbl${done?" done":""}">${item.n}</div>
          <div class="shop-qty">${item.q}</div>
        </div>`;
    });
    html += `</div>`;
  });

  html += `<button class="reset-btn" onclick="resetChecked()">🗑 Tout décocher</button>`;
  document.getElementById("shop-content").innerHTML = html;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function switchTab(tab) {
  state.tab = tab;
  state.swapping = null;
  document.getElementById("tab-plan").classList.toggle("active", tab==="plan");
  document.getElementById("tab-courses").classList.toggle("active", tab==="courses");
  render();
}

function setDay(i) {
  state.activeDay = i;
  state.swapping = null;
  renderNav();
  renderPlan();
}

function toggleSwap(dayIdx, slotIdx) {
  if(dayIdx===null) { state.swapping = null; }
  else if(state.swapping && state.swapping.dayIdx===dayIdx && state.swapping.slotIdx===slotIdx) {
    state.swapping = null;
  } else {
    state.swapping = {dayIdx, slotIdx};
  }
  renderPlan();
}

function swapMeal(dayIdx, slotIdx, altId, type) {
  const alt = (ALT[type]||[]).find(a=>a.id===altId);
  if(!alt) return;
  state.days[dayIdx].slots[slotIdx].meal = alt;
  state.swapping = null;
  showToast("✅ Repas remplacé !");
  renderPlan();
}

function toggleCheck(key) {
  state.checked[key] = !state.checked[key];
  saveChecked();
  renderShop();
}

function resetChecked() {
  state.checked = {};
  saveChecked();
  showToast("🗑 Liste réinitialisée");
  renderShop();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
